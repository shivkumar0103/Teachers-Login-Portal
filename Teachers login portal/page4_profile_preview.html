<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MSEC Teacher Portal — Profile Preview</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #6B3FA0;
    --purple-light: #8B5FBF;
    --purple-dark: #4A2875;
    --pink: #D4537E;
    --pink-light: #E8789F;
    --pink-dark: #A83A60;
    --gradient: linear-gradient(135deg, #6B3FA0 0%, #D4537E 100%);
    --gradient-soft: linear-gradient(135deg, #f3eefe 0%, #fce8f1 100%);
    --bg: #f7f4fc;
    --card-bg: #ffffff;
    --text: #1a1025;
    --muted: #7a6e8a;
    --border: #e8e0f5;
    --input-bg: #f9f6fe;
    --success: #1b8a6b;
    --shadow: 0 8px 40px rgba(107,63,160,0.13);
    --shadow-sm: 0 2px 12px rgba(107,63,160,0.09);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  #auth-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  #auth-wrapper::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(107,63,160,0.09) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none;
  }
  #auth-wrapper::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,83,126,0.07) 0%, transparent 70%);
    bottom: -150px; left: -100px;
    pointer-events: none;
  }

  .auth-card {
    background: var(--card-bg);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 2.5rem 2.5rem 2rem;
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-area { text-align: center; margin-bottom: 1.6rem; }
  .logo-area img { height: 54px; object-fit: contain; }
  .auth-divider { width: 100%; height: 1px; background: var(--border); margin: 0 0 1.6rem; }

  .screen-title {
    font-family: 'Sora', sans-serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--purple-dark);
    margin-bottom: 0.3rem;
  }
  .screen-sub {
    font-size: 0.875rem;
    color: var(--muted);
    margin-bottom: 1.6rem;
    line-height: 1.5;
  }

  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--purple-dark);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  input[type=email], input[type=text], input[type=password], input[type=tel] {
    width: 100%;
    padding: 0.72rem 1rem;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--input-bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
    margin-bottom: 1rem;
  }
  input:focus {
    border-color: var(--purple-light);
    box-shadow: 0 0 0 3px rgba(107,63,160,0.12);
  }

  .otp-row { display: flex; gap: 10px; margin-bottom: 1rem; }
  .otp-row input {
    width: 52px; height: 52px;
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    padding: 0;
    margin-bottom: 0;
    flex-shrink: 0;
  }

  .btn-primary {
    width: 100%;
    padding: 0.78rem 1rem;
    border-radius: 12px;
    background: var(--gradient);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.97rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
    margin-top: 0.25rem;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.99); }

  .btn-ghost {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--purple);
    width: 100%;
    padding: 0.72rem 1rem;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.93rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 0.6rem;
  }
  .btn-ghost:hover { background: var(--gradient-soft); }

  .link-btn {
    background: none;
    border: none;
    color: var(--pink);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }

  .toggle-row {
    text-align: center;
    margin-top: 1.2rem;
    font-size: 0.88rem;
    color: var(--muted);
  }

  .error-msg {
    background: #ffeef4;
    color: #a83a60;
    border-radius: 10px;
    padding: 0.55rem 0.9rem;
    font-size: 0.84rem;
    margin-bottom: 0.8rem;
    display: none;
  }
  .success-msg {
    background: #eaf8f3;
    color: var(--success);
    border-radius: 10px;
    padding: 0.55rem 0.9rem;
    font-size: 0.84rem;
    margin-bottom: 0.8rem;
    display: none;
  }

  .profile-card {
    background: var(--gradient-soft);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 1.1rem 1.2rem;
    margin-bottom: 1.2rem;
  }
  .profile-card .pname {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--purple-dark);
    margin-bottom: 0.5rem;
  }
  .profile-card .prow {
    display: flex;
    gap: 0.5rem;
    font-size: 0.84rem;
    color: var(--muted);
    margin-bottom: 0.25rem;
    align-items: center;
  }
  .profile-card .prow span:first-child {
    min-width: 80px;
    font-weight: 600;
    color: var(--purple);
  }

  .pass-toggle { position: relative; }
  .pass-toggle input { padding-right: 2.8rem; }
  .eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-55%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    color: var(--muted);
  }

  .otp-hint { font-size: 0.78rem; color: var(--muted); margin-top: -0.7rem; margin-bottom: 0.9rem; }
  .otp-hint span { color: var(--pink); font-weight: 700; }

  /* DASHBOARD */
  body.dashboard-body { background: var(--bg); }
  .dash-topbar {
    background: var(--card-bg);
    border-bottom: 1.5px solid var(--border);
    padding: 0.85rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .dash-topbar img { height: 40px; object-fit: contain; }
  .topbar-right { display: flex; align-items: center; gap: 1rem; }
  .teacher-badge {
    background: var(--gradient-soft);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.3rem 0.85rem;
    font-size: 0.84rem;
    font-weight: 600;
    color: var(--purple-dark);
  }
  .logout-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.35rem 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.84rem;
    color: var(--pink);
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
  }
  .logout-btn:hover { background: #fce8f1; }
  .dash-body { padding: 2rem; max-width: 1100px; margin: 0 auto; }
  .welcome-banner {
    background: var(--gradient);
    border-radius: 20px;
    padding: 1.8rem 2rem;
    color: #fff;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .welcome-banner h2 {
    font-family: 'Sora', sans-serif;
    font-size: 1.45rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .welcome-banner p { font-size: 0.9rem; opacity: 0.88; }
  .banner-meta { text-align: right; font-size: 0.85rem; opacity: 0.82; }
  .banner-meta b { display: block; font-size: 1rem; opacity: 1; margin-bottom: 2px; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--card-bg);
    border-radius: 16px;
    border: 1.5px solid var(--border);
    padding: 1.1rem 1.2rem;
    box-shadow: var(--shadow-sm);
  }
  .stat-label {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
  }
  .stat-val {
    font-family: 'Sora', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--purple-dark);
  }
  .stat-card.accent { background: var(--gradient); border-color: transparent; }
  .stat-card.accent .stat-label, .stat-card.accent .stat-val { color: #fff; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  @media(max-width:680px) { .two-col { grid-template-columns: 1fr; } }
  .panel {
    background: var(--card-bg);
    border-radius: 18px;
    border: 1.5px solid var(--border);
    padding: 1.4rem 1.5rem;
    box-shadow: var(--shadow-sm);
  }
  .panel-title {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--purple-dark);
    margin-bottom: 1.1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .panel-title .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gradient);
    flex-shrink: 0;
  }
  .notice-item { padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
  .notice-item:last-child { border-bottom: none; padding-bottom: 0; }
  .notice-item .n-tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 6px;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .tag-notice { background: #f3eefe; color: var(--purple); }
  .tag-event  { background: #fce8f1; color: var(--pink-dark); }
  .tag-exam   { background: #fff3e0; color: #b06a00; }
  .notice-item .n-text { font-size: 0.875rem; color: var(--text); line-height: 1.45; }
  .notice-item .n-date { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .tt-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .tt-row:last-child { border-bottom: none; }
  .tt-time { font-size: 0.78rem; color: var(--muted); font-weight: 600; min-width: 60px; }
  .tt-sub { font-size: 0.88rem; color: var(--text); font-weight: 500; }
  .tt-room { font-size: 0.78rem; background: #f3eefe; color: var(--purple); border-radius: 6px; padding: 2px 8px; font-weight: 600; }
  .info-row { display: flex; gap: 8px; padding: 0.45rem 0; border-bottom: 1px solid var(--border); }
  .info-row:last-child { border-bottom: none; }
  .info-key { min-width: 110px; font-size: 0.82rem; font-weight: 600; color: var(--purple); }
  .info-val { font-size: 0.87rem; color: var(--text); }


</style>
</head>
